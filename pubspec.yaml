name: attendance_management_system
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.5+1

  # Local Database
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.7+1
  path: ^1.9.1

  # Local Storage
  shared_preferences: ^2.5.3

  # Password Hashing
  crypto: ^3.0.6
  bcrypt: ^1.2.0

  # Date Formatting
  intl: ^0.20.2

  # File Picking
  file_picker: ^11.0.2

  # spread sheet file reading
  csv: ^6.0.0
  excel_plus: ^2.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # App Icon Generator
  flutter_launcher_icons: ^0.14.4

  # Native Splash Screen Generator
  flutter_native_splash: ^2.4.6

# ------------------------------------------------------------
# Flutter Launcher Icons Configuration
# ------------------------------------------------------------
flutter_launcher_icons:
  image_path: assets/images/logo.png

  android: true
  ios: true

  linux:
    generate: true

  windows:
    generate: true
    image_path: assets/images/logo.png

  macos:
    generate: true
    image_path: assets/images/logo.png

  adaptive_icon_foreground: assets/images/logo.png
  adaptive_icon_background: "@android:color/system_accent1_100"

# ------------------------------------------------------------
# Flutter Native Splash Configuration
# ------------------------------------------------------------
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#121212"

  image: assets/images/logo.png
  image_dark: assets/images/logo.png

  android_12:
    color: "#FFFFFF"
    color_dark: "#121212"

    image: assets/images/logo.png
    image_dark: assets/images/logo.png

# ------------------------------------------------------------
# Flutter Configuration
# ------------------------------------------------------------
flutter:
  uses-material-design: true

  assets:
    - assets/images/
